# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - api-authorizations

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to registry
      uses: docker/login-action@v1
      with:
        registry: https://portafolio.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_6e26d40b487d477fa4206a46f21d1070 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_4c5354fe1f124d2ca9cebe314f7f4afd }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: portafolio.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_6e26d40b487d477fa4206a46f21d1070 }}/api-authorizations:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'api-authorizations'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_bfad5966c0534a44a0298c8fcdc50447 }}
        images: 'portafolio.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_6e26d40b487d477fa4206a46f21d1070 }}/api-authorizations:${{ github.sha }}'