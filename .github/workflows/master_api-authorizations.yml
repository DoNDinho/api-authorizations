# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - api-authorizations

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to registry
      uses: docker/login-action@v1
      with:
        registry: https://mcr.microsoft.com/
        username: ${{ secrets.AzureAppService_ContainerUsername_c2301700a6f744818149124455fcdde4 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_3aa50afda3c44bdd93bc77c1ea282526 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_c2301700a6f744818149124455fcdde4 }}/portafolio/api-authorizations:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'api-authorizations'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_8f177ba6340d4772b0b0406ca0463041 }}
        images: 'mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_c2301700a6f744818149124455fcdde4 }}/portafolio/api-authorizations:${{ github.sha }}'