# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - api-authorizations

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to registry
      uses: docker/login-action@v1
      with:
        registry: https://authorizations.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_9de67a775d324d4d970ba4e6bf0dafd0 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_941f9550aa464db4af2733c854ba8678 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v2
      with:
        push: true
        tags: authorizations.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_9de67a775d324d4d970ba4e6bf0dafd0 }}/portafolio/api-authorizations:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'api-authorizations'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_e9b4f780f144486ebb615ee8bce59ba1 }}
        images: 'authorizations.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_9de67a775d324d4d970ba4e6bf0dafd0 }}/portafolio/api-authorizations:${{ github.sha }}'